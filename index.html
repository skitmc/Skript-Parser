<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skript-Parser | IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-side: #161b22;
            --border: #30363d;
            --cyan-accent: #58a6ff;
        }
        body { background-color: var(--bg-main); color: #c9d1d9; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Clean Professional Logo */
        .logo-text {
            font-weight: 800;
            font-size: 1.25rem;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        .logo-text span { color: var(--cyan-accent); }

        .sidebar { background: var(--bg-side); border-left: 1px solid var(--border); width: 340px; display: flex; flex-direction: column; }
        #monaco-editor { flex: 1; height: 100%; }
        
        .btn-primary { background: #238636; color: white; transition: 0.2s; }
        .btn-primary:hover { background: #2ea043; }
        
        .btn-secondary { background: #21262d; border: 1px solid var(--border); color: #c9d1d9; transition: 0.2s; }
        .btn-secondary:hover { background: #30363d; }

        .console-box { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8b949e; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-14 flex items-center justify-between px-6 bg-[#161b22] border-b border-[#30363d]">
        <div class="flex items-center gap-3">
            <div class="logo-text">SKRIPT<span>-PARSER</span></div>
            <span class="text-[10px] text-[#484f58] font-bold border border-[#30363d] px-2 py-0.5 rounded">STABLE</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="applyAutoFix()" class="btn-secondary flex items-center gap-2 px-3 py-1.5 rounded text-xs font-semibold">
                <i data-lucide="wrench" class="w-3.5 h-3.5"></i> Fix Syntax
            </button>
            <button onclick="runAnalysis()" class="btn-primary flex items-center gap-2 px-4 py-1.5 rounded text-xs font-semibold">
                <i data-lucide="play" class="w-3.5 h-3.5"></i> Run Analysis
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <div id="monaco-editor"></div>

        <aside class="sidebar">
            <div class="p-5 border-b border-[#30363d]">
                <div class="text-[10px] font-bold text-[#8b949e] uppercase tracking-widest mb-3">System Health</div>
                <div class="bg-[#0d1117] border border-[#30363d] rounded-lg p-3">
                    <div class="flex items-center gap-2 mb-1">
                        <div id="status-led" class="w-2 h-2 rounded-full bg-green-500"></div>
                        <span id="status-text" class="text-xs font-bold text-white">Parser Online</span>
                    </div>
                    <p class="text-[11px] text-[#8b949e]">Engine linked to SKITMC repository.</p>
                </div>
            </div>

            <div class="flex-1 p-5 overflow-y-auto">
                <div class="text-[10px] font-bold text-[#8b949e] uppercase tracking-widest mb-3">Console</div>
                <div id="console-logs" class="console-box space-y-2">
                    <div class="opacity-50">> Initializing workspace...</div>
                </div>
            </div>

            <div class="p-5 text-[10px] text-[#484f58] border-t border-[#30363d]">
                This community project supports the **SKITMC** repository development effort.
            </div>
        </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
